    <text x="60" y="113" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#d8c17c">#</text>
    <text x="132" y="113" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#d8c17c">EQUIPO</text>
    <text x="625" y="113" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#d8c17c">PROM.</text>
    <text x="770" y="113" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#d8c17c">TOTAL</text>
