<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330">
  <defs>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#07140d" stop-opacity=".92"/>
      <stop offset=".6" stop-color="#10291a" stop-opacity=".82"/>
      <stop offset="1" stop-color="#030604" stop-opacity=".92"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#f6e7a7"/>
