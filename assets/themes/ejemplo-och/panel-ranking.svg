    </linearGradient>
    <filter id="glow" x="-8%" y="-20%" width="116%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#dcb955" flood-opacity=".34"/>
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".55"/>
